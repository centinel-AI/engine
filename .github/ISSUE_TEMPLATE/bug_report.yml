name: Bug report
description: Report defects — crashes, wrong behavior, regressions, or unclear errors when using Grauss.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Short, **reproducible** reports get fixed faster.

        **Do not paste secrets** (tokens, keys, full `backend.tf.json` with auth). Redact or describe paths only.

        If this is a **security vulnerability**, do **not** use this form — use private reporting (see `SECURITY.md`).

        **Provider reference (Terraform Registry):**
        - **Azure** — platform work uses [**AzureRM**](https://registry.terraform.io/providers/hashicorp/azurerm/latest); identity / Entra ID uses [**AzureAD**](https://registry.terraform.io/providers/hashicorp/azuread/latest) (both are the same Azure stack, not a separate cloud).
        - **Oracle Cloud** — [**OCI provider**](https://registry.terraform.io/providers/oracle/oci/latest).

  - type: dropdown
    id: bug_type
    attributes:
      label: Bug type
      description: What best describes the problem?
      options:
        - Wrong behavior (incorrect result or state)
        - Crash / hang (CLI or container exits or freezes)
        - Regression (used to work, now fails)
        - Codegen (generated .tf is incorrect or missing)
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: cloud
    attributes:
      label: Cloud
      description: >-
        Which provider surface? For Azure, pick Azure even if the bug is Azure AD / Entra-only —
        AzureRM and AzureAD are the same Azure stack. For OCI, use Oracle Cloud.
      options:
        - Azure (AzureRM + Azure AD / Entra ID)
        - GCP
        - AWS
        - Oracle Cloud Infrastructure (OCI)
        - Multiple / not sure
        - Not applicable (e.g. local tooling only)
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Engine
      description: Terraform or OpenTofu?
      options:
        - Terraform
        - OpenTofu
        - Not sure
    validations:
      required: true

  - type: input
    id: compose_service
    attributes:
      label: Compose service (optional)
      description: If you used Docker Compose, which service? e.g. `engine-gcp-opentofu`
      placeholder: engine-azure-terraform

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences — what is broken?
      placeholder: After `terraform plan`, the workspace fails to resolve backend; error shows ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps someone else can follow (host OS, `task` / `docker compose` commands, etc.).
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened — including exact error messages.
    validations:
      required: true

  - type: input
    id: cli_version
    attributes:
      label: Terraform / OpenTofu version
      description: Output of `terraform version` or `tofu version`.
      placeholder: e.g. Terraform v1.15.2 or OpenTofu v1.11.7
    validations:
      required: true

  - type: input
    id: tf_var_project
    attributes:
      label: ENGINE_TF_VAR_project / data folder
      description: Which project under `<data-repo>/<cloud>/`? e.g. `project-01`, `_bootstrap`
      placeholder: project-01
    validations:
      required: true

  - type: input
    id: host_os
    attributes:
      label: Host OS
      description: Where you ran the engine (laptop, CI, etc.).
      placeholder: macOS 15 / Ubuntu 24.04 / Windows 11 / ...
    validations:
      required: true

  - type: textarea
    id: minimal_json
    attributes:
      label: Minimal JSON or file hints
      description: Redacted snippet or list of `<data-repo>/<cloud>/<project>/...` files involved (no secrets).
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Logs and full error output
      description: Paste stderr / container logs. Redact account IDs or endpoints if needed.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, image digests (`docker image inspect`), or `git rev-parse HEAD`.
      render: markdown
