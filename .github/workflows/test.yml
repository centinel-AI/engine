name: Run tests

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Cloud provider"
        required: true
        type: choice
        default: all
        options:
          - all
          - azure
          - aws
          - gcp
          - oci

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}

    steps:
      - name: Build matrix
        id: matrix
        run: |
          CLOUD="${{ inputs.cloud }}"
          [ "$CLOUD" = "all" ] \
            && VALUE='["azure","aws","gcp","oci"]' \
            || VALUE='["'"$CLOUD"'"]'
          echo "value={\"cloud\":$VALUE}" >> "$GITHUB_OUTPUT"

  test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      ENGINE_ARM_CLIENT_ID:       ${{ secrets.ENGINE_ARM_CLIENT_ID }}
      ENGINE_ARM_CLIENT_SECRET:   ${{ secrets.ENGINE_ARM_CLIENT_SECRET }}
      ENGINE_ARM_TENANT_ID:       ${{ secrets.ENGINE_ARM_TENANT_ID }}
      ENGINE_ARM_SUBSCRIPTION_ID: ${{ secrets.ENGINE_ARM_SUBSCRIPTION_ID }}
      ENGINE_AWS_ACCESS_KEY_ID:     ${{ secrets.ENGINE_AWS_ACCESS_KEY_ID }}
      ENGINE_AWS_SECRET_ACCESS_KEY: ${{ secrets.ENGINE_AWS_SECRET_ACCESS_KEY }}
      ENGINE_AWS_DEFAULT_REGION:    ${{ secrets.ENGINE_AWS_DEFAULT_REGION }}
      ENGINE_GOOGLE_PROJECT:     ${{ secrets.ENGINE_GOOGLE_PROJECT }}
      ENGINE_GOOGLE_CREDENTIALS: ${{ secrets.ENGINE_GOOGLE_CREDENTIALS }}
      ENGINE_OCI_TENANCY_OCID:      ${{ secrets.ENGINE_OCI_TENANCY_OCID }}
      ENGINE_OCI_USER_OCID:         ${{ secrets.ENGINE_OCI_USER_OCID }}
      ENGINE_OCI_FINGERPRINT:       ${{ secrets.ENGINE_OCI_FINGERPRINT }}
      ENGINE_OCI_PRIVATE_KEY_FILE:  ${{ secrets.ENGINE_OCI_PRIVATE_KEY_FILE }}

    steps:
      - uses: actions/checkout@v6

      - name: Read Terraform version pin
        id: pins
        run: |
          echo "terraform=$(grep '^ENGINE_TERRAFORM_VERSION=' .env.example | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.pins.outputs.terraform }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tests/go.mod
          cache-dependency-path: tests/go.sum

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Terraform plugin cache
        uses: actions/cache@v5
        with:
          path: tmp/tf-plugin-cache
          key: tf-plugins-${{ matrix.cloud }}-${{ hashFiles('.env.example') }}
          restore-keys: tf-plugins-${{ matrix.cloud }}-

      - name: Restore codegen schema cache
        uses: actions/cache@v5
        with:
          path: tmp/codegen
          key: codegen-${{ matrix.cloud }}-${{ hashFiles('.env.example') }}
          restore-keys: codegen-${{ matrix.cloud }}-

      - name: Initialize environment
        run: task env:init

      - name: Run tests
        run: task test:plan:${{ matrix.cloud }}

      - name: Summary
        if: always()
        run: |
          echo "### Test run — ${{ matrix.cloud }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--|--|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Cloud** | \`${{ matrix.cloud }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
