# Grauss engine — ten images (azure | aws | gcp | oci | ovh × terraform | opentofu).
# Provider registries: .cursor/rules/grauss-providers-and-clouds.mdc.
# Extension fields (x-*) are Compose-ignored anchors for reuse; see https://docs.docker.com/compose/compose-file/11-extension/
#
# Host `.env` uses ENGINE_* prefixes. Engine services receive provider-standard names (ARM_*, TF_VAR_*, …).

x-engine-data-volume: &engine_data_volume
  type: bind
  source: ./data
  target: /app/workspace/data

x-build-args-common: &build_args_common
  ALPINE_VERSION: ${ENGINE_ALPINE_VERSION:-3.21.3}
  TERRAFORM_VERSION: ${ENGINE_TERRAFORM_VERSION:-1.15.3}
  OPENTOFU_VERSION: ${ENGINE_OPENTOFU_VERSION:-1.11.7}
  AZURERM_VERSION: ${ENGINE_AZURERM_VERSION:-=4.72.0}
  AZUREAD_VERSION: ${ENGINE_AZUREAD_VERSION:-=3.8.0}
  GOOGLE_PROVIDER_VERSION: ${ENGINE_GOOGLE_PROVIDER_VERSION:-=7.32.0}
  AWS_PROVIDER_VERSION: ${ENGINE_AWS_PROVIDER_VERSION:-=6.44.0}
  OCI_PROVIDER_VERSION: ${ENGINE_OCI_PROVIDER_VERSION:-=8.13.0}
  OVH_PROVIDER_VERSION: ${ENGINE_OVH_PROVIDER_VERSION:-=2.13.1}
  TERRAFORM_REQUIRED_VERSION: =${ENGINE_TERRAFORM_VERSION:-1.15.3}
  OPENTOFU_REQUIRED_VERSION: =${ENGINE_OPENTOFU_VERSION:-1.11.7}

x-env-azure: &env_azure
  ARM_USE_AZUREAD: ${ENGINE_ARM_USE_AZUREAD:-false}
  ARM_CLIENT_ID: ${ENGINE_ARM_CLIENT_ID:-}
  ARM_CLIENT_SECRET: ${ENGINE_ARM_CLIENT_SECRET:-}
  ARM_SUBSCRIPTION_ID: ${ENGINE_ARM_SUBSCRIPTION_ID:-}
  ARM_TENANT_ID: ${ENGINE_ARM_TENANT_ID:-}
  TF_VAR_project: ${ENGINE_TF_VAR_project:-}

x-env-gcp: &env_gcp
  GOOGLE_PROJECT: ${ENGINE_GOOGLE_PROJECT:-}
  GOOGLE_REGION: ${ENGINE_GOOGLE_REGION:-}
  GOOGLE_ZONE: ${ENGINE_GOOGLE_ZONE:-}
  GOOGLE_CREDENTIALS: ${ENGINE_GOOGLE_CREDENTIALS:-}
  GOOGLE_APPLICATION_CREDENTIALS: ${ENGINE_GOOGLE_APPLICATION_CREDENTIALS:-}
  TF_VAR_project: ${ENGINE_TF_VAR_project:-}

x-env-aws: &env_aws
  AWS_ACCESS_KEY_ID: ${ENGINE_AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${ENGINE_AWS_SECRET_ACCESS_KEY:-}
  AWS_SESSION_TOKEN: ${ENGINE_AWS_SESSION_TOKEN:-}
  AWS_DEFAULT_REGION: ${ENGINE_AWS_DEFAULT_REGION:-}
  AWS_REGION: ${ENGINE_AWS_REGION:-${ENGINE_AWS_DEFAULT_REGION:-}}
  TF_VAR_project: ${ENGINE_TF_VAR_project:-}

# OVH auth: application key + secret + consumer key — see https://api.ovh.com/createToken
# OVH S3 (TF_VAR_ovh_s3_*) are passed to the aws provider configured for OVH Object Storage endpoint.
x-env-ovh: &env_ovh
  TF_VAR_project: ${ENGINE_TF_VAR_project:-}
  OVH_ENDPOINT: ${ENGINE_OVH_ENDPOINT:-ovh-eu}
  OVH_APPLICATION_KEY: ${ENGINE_OVH_APPLICATION_KEY:-}
  OVH_APPLICATION_SECRET: ${ENGINE_OVH_APPLICATION_SECRET:-}
  OVH_CONSUMER_KEY: ${ENGINE_OVH_CONSUMER_KEY:-}
  TF_VAR_ovh_service_name: ${ENGINE_OVH_SERVICE_NAME:-}
  TF_VAR_ovh_s3_region: ${ENGINE_OVH_S3_REGION:-gra}
  TF_VAR_ovh_s3_endpoint: ${ENGINE_OVH_S3_ENDPOINT:-https://s3.gra.io.cloud.ovh.net}
  TF_VAR_ovh_s3_access_key: ${ENGINE_OVH_S3_ACCESS_KEY:-}
  TF_VAR_ovh_s3_secret_key: ${ENGINE_OVH_S3_SECRET_KEY:-}

# OCI auth: config file profile and/or API signing keys — see https://docs.oracle.com/en-us/iaas/Content/API/Concepts/apisigningkey.htm
x-env-oci: &env_oci
  TF_VAR_project: ${ENGINE_TF_VAR_project:-}
  OCI_CONFIG_FILE: ${ENGINE_OCI_CONFIG_FILE:-}
  OCI_CLI_PROFILE: ${ENGINE_OCI_CLI_PROFILE:-}
  OCI_REGION: ${ENGINE_OCI_REGION:-}
  OCI_TENANCY_OCID: ${ENGINE_OCI_TENANCY_OCID:-}
  OCI_USER_OCID: ${ENGINE_OCI_USER_OCID:-}
  OCI_FINGERPRINT: ${ENGINE_OCI_FINGERPRINT:-}
  OCI_PRIVATE_KEY_FILE: ${ENGINE_OCI_PRIVATE_KEY_FILE:-}
  OCI_PRIVATE_KEY_PASSWORD: ${ENGINE_OCI_PRIVATE_KEY_PASSWORD:-}
  OCI_CLI_AUTH: ${ENGINE_OCI_CLI_AUTH:-}

x-engine-runtime: &engine_runtime
  volumes:
    - <<: *engine_data_volume
  networks:
    - engine-network

services:
  engine-azure-terraform:
    <<: *engine_runtime
    image: grauss-azure-terraform
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: azure
        ENGINE: terraform
    hostname: engine-azure-terraform
    environment: *env_azure

  engine-azure-opentofu:
    <<: *engine_runtime
    image: grauss-azure-opentofu
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: azure
        ENGINE: opentofu
    hostname: engine-azure-opentofu
    environment: *env_azure

  engine-gcp-terraform:
    <<: *engine_runtime
    image: grauss-gcp-terraform
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: gcp
        ENGINE: terraform
    hostname: engine-gcp-terraform
    environment: *env_gcp

  engine-gcp-opentofu:
    <<: *engine_runtime
    image: grauss-gcp-opentofu
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: gcp
        ENGINE: opentofu
    hostname: engine-gcp-opentofu
    environment: *env_gcp

  engine-aws-terraform:
    <<: *engine_runtime
    image: grauss-aws-terraform
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: aws
        ENGINE: terraform
    hostname: engine-aws-terraform
    environment: *env_aws

  engine-aws-opentofu:
    <<: *engine_runtime
    image: grauss-aws-opentofu
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: aws
        ENGINE: opentofu
    hostname: engine-aws-opentofu
    environment: *env_aws

  engine-oci-terraform:
    <<: *engine_runtime
    image: grauss-oci-terraform
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: oci
        ENGINE: terraform
    hostname: engine-oci-terraform
    environment: *env_oci

  engine-oci-opentofu:
    <<: *engine_runtime
    image: grauss-oci-opentofu
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: oci
        ENGINE: opentofu
    hostname: engine-oci-opentofu
    environment: *env_oci

  engine-ovh-terraform:
    <<: *engine_runtime
    image: grauss-ovh-terraform
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: ovh
        ENGINE: terraform
    hostname: engine-ovh-terraform
    environment: *env_ovh

  engine-ovh-opentofu:
    <<: *engine_runtime
    image: grauss-ovh-opentofu
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build_args_common
        CLOUD_PROVIDER: ovh
        ENGINE: opentofu
    hostname: engine-ovh-opentofu
    environment: *env_ovh

networks:
  engine-network:
    driver: bridge
